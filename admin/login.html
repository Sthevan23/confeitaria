<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Gimarry Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">

  <div class="login">
    <div class="login__visual">
      <div class="login__overlay"></div>
      <div class="login__visual-content">
        <i class="fas fa-birthday-cake"></i>
        <h1>Gimarry</h1>
        <p>Bolos e Doces</p>
      </div>
    </div>

    <div class="login__form-wrapper">
      <div class="login__form-container">
        <div class="login__header">
          <h2>Bem-vindo de volta</h2>
          <p>Faça login para acessar o painel</p>
        </div>

        <form id="login-form" class="login__form">
          <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Senha</label>
            <div class="input-password">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="toggle-password" aria-label="Mostrar senha"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="login__options">
            <label class="checkbox-label">
              <input type="checkbox" id="remember"> Lembrar-me
            </label>
            <a href="#" id="forgot-password" class="login__forgot">Recuperar senha</a>
          </div>
          <button type="submit" class="btn btn--primary btn--full">
            <i class="fas fa-sign-in-alt"></i> Entrar
          </button>
          <p class="login__error" id="login-error"></p>
        </form>

        <a href="../index.html" class="login__back"><i class="fas fa-arrow-left"></i> Voltar ao site</a>

        <div class="login__hint">
          <p><strong>Demo:</strong> admin@gimarry.com.br / admin123</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal recuperar senha -->
  <div class="modal" id="recover-modal">
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <button class="modal__close" aria-label="Fechar"><i class="fas fa-times"></i></button>
      <h3><i class="fas fa-key"></i> Recuperar Senha</h3>
      <p>Digite seu e-mail para receber instruções de recuperação.</p>
      <form id="recover-form">
        <div class="form-group">
          <label for="recover-email">E-mail</label>
          <input type="email" id="recover-email" placeholder="seu@email.com" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Enviar</button>
      </form>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script>
    // Verificar se já está logado
    if (sessionStorage.getItem('admin_logged') === 'true') {
      window.location.href = 'index.html';
    }

    // Toggle senha
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      const icon = this.querySelector('i');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      if (Storage.login(email, password)) {
        sessionStorage.setItem('admin_logged', 'true');
        sessionStorage.setItem('admin_email', email);
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = 'E-mail ou senha incorretos.';
        errorEl.style.display = 'block';
      }
    });

    // Recuperar senha
    const modal = document.getElementById('recover-modal');
    document.getElementById('forgot-password').addEventListener('click', (e) => {
      e.preventDefault();
      modal.classList.add('active');
    });
    modal.querySelector('.modal__close').addEventListener('click', () => modal.classList.remove('active'));
    modal.querySelector('.modal__overlay').addEventListener('click', () => modal.classList.remove('active'));

    document.getElementById('recover-form').addEventListener('submit', (e) => {
      e.preventDefault();
      modal.classList.remove('active');
      alert('Instruções de recuperação enviadas para o e-mail informado. (Simulação)');
    });
  </script>
</body>
</html>
